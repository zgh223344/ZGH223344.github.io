<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图书展销平台 实验二</title>
    <link rel="stylesheet" href="./css/lab2-2504-157-index.css">
</head>
<body>
<!-- 头部导航 -->
<div class="header">
    <div class="logo">图书展销平台</div>
    <div class="nav">
        <a href="#">首页</a>
        <a href="#">图书分类</a>
        <a href="#">热门推荐</a>
        <a href="#">关于我们</a>
    </div>
</div>

<!-- 主体内容 -->
<div class="container">
    <!-- 左侧栏 -->
    <div class="left">
        <h3>图书分类</h3>
        <ul>
            <li>文学小说</li>
            <li>历史名著</li>
            <li>少儿读物</li>
            <li>励志散文</li>
        </ul>
    </div>

    <!-- 中间图书区 -->
    <div class="main">
        <h3>热门图书推荐</h3>
        <div class="book-box">
            <div class="book-item">
                <img src="https://m.360buyimg.com/mobilecms/s750x750_jfs/t1/63654/33/2304/258890/5d0a144cEbfdd8b73/b6a56c1a8095ab1d.jpg!q80.dpg" alt="红楼梦">
                <p>红楼梦</p>
            </div>
            <div class="book-item">
                <img src="https://static.bjd.com.cn/dams-res/editing/image/202509/14/seaaoo7kyh05r96ojofojakl.jpg" alt="我与地坛">
                <p>我与地坛</p>
            </div>
            <div class="book-item">
                <img src="https://ts2.tc.mm.bing.net/th/id/OIP-C.IIvBg4W_vP2DqTEk2Skp4AHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" alt="狼王梦">
                <p>狼王梦</p>
            </div>
        </div>
    </div>

    <!-- 右侧栏 -->
    <div class="right">
        <h3>促销活动</h3>
        <p>全场图书8折</p>
        <p>满100减20</p>
    </div>
</div>
